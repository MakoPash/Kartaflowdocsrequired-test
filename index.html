          'display:none;margin-top:10px;padding:14px 16px;',
          'background:rgba(255,255,255,0.65);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);',
          'border-radius:12px;font-size:13px;color:var(--text-2);line-height:1.7;',
          'border:0.5px solid rgba(232,19,42,0.12);',
          'box-shadow:0 2px 12px rgba(0,0,0,0.06);',
          'animation:panelIn 0.22s cubic-bezier(0.34,1.3,0.64,1) both;',
        ].join('');
        infoPanel.innerHTML = doc.info;
        let open = false;
        infoToggle.onclick = (e) => {
          e.stopPropagation();
          open = !open;
          infoPanel.style.display = open ? 'block' : 'none';
          if (open) {
            infoToggle.style.background = 'linear-gradient(135deg,rgba(10,10,10,0.92) 0%,rgba(30,10,12,0.95) 100%)';
            infoToggle.style.borderColor = 'transparent';
            infoToggle.style.color = '#fff';
            infoToggle.innerHTML = '<svg width="11" height="11" viewBox="0 0 12 12" fill="none" style="flex-shrink:0"><path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg> Close';
          } else {
            infoToggle.style.background = 'linear-gradient(135deg,rgba(232,19,42,0.07) 0%,rgba(232,19,42,0.03) 100%)';
            infoToggle.style.borderColor = 'rgba(232,19,42,0.2)';
            infoToggle.style.color = 'var(--red)';
            const infoLabelText = getInfoLabel(doc.en); infoToggle.innerHTML = '<svg width="13" height="13" viewBox="0 0 14 14" fill="none" style="flex-shrink:0"><circle cx="7" cy="7" r="6.5" stroke="currentColor" stroke-width="1.2"/><path d="M7 6.3v4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><circle cx="7" cy="4.2" r="0.7" fill="currentColor"/></svg> ' + infoLabelText;
          }
        };
        body.appendChild(infoToggle);
        body.appendChild(infoPanel);
      }

      item.appendChild(body);
      wrap.appendChild(item);
    });
    c.appendChild(wrap);
  }

  renderDocGroup(mandatory, tx('alwaysGroup'));
  renderDocGroup(conditional, tx('conditionalGroup'));
  renderDocGroup(optional, tx('optionalGroup'));

  // Back + Reset buttons
  const btnRow = document.createElement('div');
  btnRow.style.cssText = 'display:flex;gap:12px;margin-top:40px;flex-wrap:wrap;';

  const backBtn = document.createElement('button');
  backBtn.className = 'btn btn-ghost';
  backBtn.style.cssText = 'flex:1;min-width:140px;';
  backBtn.textContent = '← ' + tx('backBtn');
  backBtn.onclick = () => {
    currentStep = activeQuestions().length - 1;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };
  btnRow.appendChild(backBtn);

  const resetBtn = document.createElement('button');
  resetBtn.className = 'reset-btn';
  resetBtn.style.cssText = 'flex:1;min-width:140px;margin:0;';
  resetBtn.textContent = '↺ ' + tx('startOver');
  resetBtn.onclick = resetAll;
  btnRow.appendChild(resetBtn);

  c.appendChild(btnRow);

  // ── Bottom specialist card (desktop) ──────────────────────────────────────
  const botCard = document.createElement('div');
  botCard.style.cssText = [
    'position:relative;overflow:hidden;margin-top:32px;',
    'background:var(--glass-bg);',
    'backdrop-filter:blur(40px) saturate(180%);-webkit-backdrop-filter:blur(40px) saturate(180%);',
    'border-radius:18px;padding:24px 26px 22px;',
    'border:0.5px solid var(--glass-border);border-left:4px solid var(--red);',
    'box-shadow:var(--shadow-card);',
  ].join('');
  botCard.innerHTML =
    '<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">' +
      '<div style="display:inline-flex;align-items:center;gap:5px;background:rgba(232,19,42,0.08);border:0.5px solid rgba(232,19,42,0.18);color:var(--red);padding:3px 11px 3px 8px;border-radius:100px;font-size:10.5px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;">' +
        '<svg width="11" height="11" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="5" stroke="currentColor" stroke-width="1.2"/><path d="M4 6.3l1.5 1.5L8 4.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
        'Verified legal expertise' +
      '</div>' +
    '</div>' +
    '<p style="font-size:13.5px;color:var(--text);line-height:1.65;margin-bottom:6px;font-weight:500;">' +
      'Ready to submit? Get a specialist review first.' +
    '</p>' +
    '<p style="font-size:13px;color:var(--text-2);line-height:1.65;margin-bottom:18px;">' +
      'This checklist is built on certified legal expertise across all Polish voivodeships. If your situation has details our questions could not fully capture, a pre-submission review ensures nothing is missed.' +
    '</p>' +
    '<div style="display:flex;gap:10px;flex-wrap:wrap;">' +
      '<a href="mailto:info@kartaflow.pl" style="display:inline-flex;align-items:center;gap:7px;background:linear-gradient(135deg,var(--red) 0%,var(--red-deep) 100%);color:#fff;padding:12px 22px;border-radius:100px;font-size:13px;font-weight:600;text-decoration:none;-webkit-tap-highlight-color:transparent;box-shadow:0 4px 20px rgba(232,19,42,0.28),0 1px 0 rgba(255,255,255,0.15) inset;letter-spacing:0.01em;">📋 Pre-submission review — 249 PLN</a>' +
      '<a href="mailto:info@kartaflow.pl" style="display:inline-flex;align-items:center;gap:7px;background:rgba(0,0,0,0.04);color:var(--text-2);padding:12px 22px;border-radius:100px;font-size:13px;font-weight:500;text-decoration:none;border:0.5px solid var(--border-strong);-webkit-tap-highlight-color:transparent;">💬 Free question</a>' +
    '</div>';
  c.appendChild(botCard);

  // ── Sticky bottom CTA (mobile only, injected once) ─────────────────────
  if (!document.getElementById('stickyCTA')) {
    const stickyCTA = document.createElement('div');
    stickyCTA.id = 'stickyCTA';
    stickyCTA.className = 'sticky-cta';
    stickyCTA.innerHTML =
      '<div class="sticky-cta-text"><strong>Ready to submit?</strong><br>Review with a specialist first</div>' +
      '<a href="mailto:info@kartaflow.pl" class="sticky-cta-btn">249 PLN — Book review</a>';
    document.body.appendChild(stickyCTA);
  }
}

function goNext() {
  const questions = activeQuestions();
  const q = questions[currentStep];
  if (!answers[q.id]) return;
  if (currentStep < questions.length - 1) {
    currentStep++;
  } else {
    currentStep = questions.length;
  }
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goBack() {
  if (currentStep > 0) {
    currentStep--;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function resetAll() {
  answers = {};
  currentStep = 0;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function setLang(l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent === l.toUpperCase());
  });
  render();
}

// Init
render();
</script>
</body>
</html>
