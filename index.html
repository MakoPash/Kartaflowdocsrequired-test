<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>KartaFlow — Your Polish Residency, Finally Under Control</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,700;0,9..144,900;1,9..144,300;1,9..144,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
:root {
  --red: #E8132A;
  --red-deep: #C01020;
  --red-soft: rgba(232,19,42,0.07);
  --red-mid: rgba(232,19,42,0.14);
  --white: #FFFFFF;
  --off-white: #F6F4F1;
  --surface: #EFECE8;
  --surface-2: #E6E2DD;
  --border: rgba(0,0,0,0.055);
  --border-strong: rgba(0,0,0,0.1);
  --dark: #0A0A0A;
  --text: #0F0F0F;
  --text-2: #3C3C3C;
  --text-3: #8C8C8C;
  --success: #16A34A;
  --warning: #D97706;
  --radius: 20px;
  --radius-sm: 14px;
  --radius-pill: 100px;
  --glass-bg: rgba(255,255,255,0.7);
  --glass-border: rgba(255,255,255,0.55);
  --shadow-card: 0 1px 0 rgba(255,255,255,0.85) inset, 0 8px 40px rgba(0,0,0,0.07), 0 2px 8px rgba(0,0,0,0.04);
  --shadow-elevated: 0 1px 0 rgba(255,255,255,0.9) inset, 0 24px 64px rgba(0,0,0,0.1), 0 4px 16px rgba(0,0,0,0.06);
  --shadow-option: 0 1px 0 rgba(255,255,255,0.8) inset, 0 2px 10px rgba(0,0,0,0.055);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── BODY / BACKGROUND ── */
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--off-white);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
/* Subtle radial glow in the background */
body::before {
  content: '';
  position: fixed;
  top: -20vh; left: 50%;
  transform: translateX(-50%);
  width: 80vw; height: 60vh;
  background: radial-gradient(ellipse at center, rgba(232,19,42,0.04) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* ── HEADER ── */
header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(246,244,241,0.82);
  backdrop-filter: blur(32px) saturate(180%);
  -webkit-backdrop-filter: blur(32px) saturate(180%);
  border-bottom: 0.5px solid rgba(0,0,0,0.08);
  height: 64px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 40px;
}
.logo {
  font-family: 'Fraunces', serif;
  font-size: 21px; font-weight: 700;
  letter-spacing: -0.5px;
  cursor: default;
  display: flex; align-items: baseline; gap: 1px;
}
.logo-karta { color: var(--dark); }
.logo-flow { color: var(--red); }
.logo-wrap {
  display: flex; flex-direction: column; gap: 1px;
}
.logo-tagline {
  font-family: 'DM Sans', sans-serif;
  font-size: 10px; font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-3);
  margin-left: 1px;
}
.lang-switcher {
  display: flex; gap: 2px;
  background: rgba(0,0,0,0.05);
  border: 0.5px solid var(--border-strong);
  border-radius: var(--radius-pill);
  padding: 3px;
}
.lang-btn {
  padding: 5px 15px;
  border: none; background: none;
  color: var(--text-3);
  font-family: 'DM Sans', sans-serif;
  font-size: 12px; font-weight: 600;
  letter-spacing: 0.04em;
  border-radius: var(--radius-pill);
  cursor: pointer;
  transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
  -webkit-tap-highlight-color: transparent;
  min-height: 32px;
}
.lang-btn.active {
  background: var(--dark);
  color: #fff;
  box-shadow: 0 1px 4px rgba(0,0,0,0.2);
}
.lang-btn:not(.active):hover { color: var(--text); }

/* ── LAYOUT ── */
main {
  max-width: 660px;
  margin: 0 auto;
  padding: 48px 24px 100px;
  position: relative; z-index: 1;
}

/* ── PROGRESS ── */
.progress-wrap {
  margin-bottom: 40px;
}
@media (max-width: 600px) {
  .progress-wrap {
    position: sticky;
    top: 56px;
    z-index: 50;
    background: rgba(246,244,241,0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    padding: 12px 20px 12px;
    margin-bottom: 0;
    border-bottom: 0.5px solid var(--border);
  }
}
/* Pill-shaped progress bar */
.progress-track {
  height: 6px;
  background: rgba(0,0,0,0.07);
  border-radius: 10px;
  overflow: hidden;
  position: relative;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--red-deep) 0%, var(--red) 100%);
  border-radius: 10px;
  transition: width 0.6s cubic-bezier(0.34,1.2,0.64,1);
  position: relative;
}
/* Shimmer effect on progress bar */
.progress-fill::after {
  content: '';
  position: absolute;
  top: 0; left: -100%; right: 0; bottom: 0;
  background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.4) 50%, transparent 100%);
  animation: shimmer 2.4s ease-in-out infinite;
  border-radius: 10px;
}
@keyframes shimmer {
  0% { left: -100%; }
  60%, 100% { left: 100%; }
}
.progress-label {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 9px;
}
.progress-text {
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-3);
}
.progress-pct {
  font-size: 12px; font-weight: 700;
  color: var(--red);
  letter-spacing: -0.2px;
}

/* ── CARD — GLASS/FROSTED ── */
.card {
  background: var(--glass-bg);
  backdrop-filter: blur(40px) saturate(180%);
  -webkit-backdrop-filter: blur(40px) saturate(180%);
  border: 0.5px solid var(--glass-border);
  border-radius: var(--radius);
  padding: 36px 40px;
  box-shadow: var(--shadow-card);
  animation: cardIn 0.4s cubic-bezier(0.34,1.2,0.64,1) both;
}
@keyframes cardIn {
  from { opacity: 0; transform: translateY(16px) scale(0.98); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* ── STEP LABEL ── */
.step-label {
  font-size: 10.5px; font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-3);
  margin-bottom: 12px;
}

/* ── DECISION BANNER ── */
.decision-banner {
  display: inline-flex; align-items: center; gap: 7px;
  background: rgba(217,119,6,0.08);
  border: 0.5px solid rgba(217,119,6,0.22);
  border-radius: 8px;
  padding: 6px 14px;
  margin-bottom: 16px;
  font-size: 11px; font-weight: 700;
  color: var(--warning);
  letter-spacing: 0.07em;
  text-transform: uppercase;
}

/* ── QUESTION ── */
.question-title {
  font-family: 'Fraunces', serif;
  font-size: 26px; font-weight: 700;
  line-height: 1.25;
  color: var(--dark);
  margin-bottom: 8px;
  letter-spacing: -0.5px;
}
.question-subtitle {
  font-size: 14px; color: var(--text-3);
  margin-bottom: 24px;
  font-style: italic;
}
.question-purpose {
  font-size: 13px; color: var(--text-2);
  margin-bottom: 28px;
  padding: 11px 16px;
  background: rgba(0,0,0,0.025);
  border-radius: 10px;
  border-left: 2px solid rgba(0,0,0,0.1);
  line-height: 1.55;
}

/* ── OPTIONS ── */
.options-grid {
  display: flex; flex-direction: column; gap: 9px;
}
.option-btn {
  display: flex; align-items: center; gap: 14px;
  padding: 15px 18px;
  background: rgba(255,255,255,0.7);
  border: 0.5px solid rgba(0,0,0,0.09);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px; font-weight: 400;
  cursor: pointer;
  text-align: left;
  transition: all 0.22s cubic-bezier(0.34,1.4,0.64,1);
  width: 100%;
  box-shadow: var(--shadow-option);
  -webkit-tap-highlight-color: transparent;
  min-height: 54px;
  position: relative;
  overflow: hidden;
}
.option-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(160deg, rgba(255,255,255,0.32) 0%, transparent 55%);
  pointer-events: none;
  border-radius: inherit;
}
.option-btn::after {
  content: '';
  position: absolute;
  top: 0; left: 8%; right: 8%; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
  pointer-events: none;
  border-radius: 1px;
}
.option-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 1px 0 rgba(255,255,255,0.95) inset, 0 8px 24px rgba(0,0,0,0.1), 0 1px 4px rgba(0,0,0,0.06);
  border-color: rgba(0,0,0,0.13);
  background: rgba(255,255,255,0.88);
}
.option-btn:active { transform: scale(0.99) translateY(0); }
/* Selected state — dark filled, red accent */
.option-btn.selected {
  background: var(--dark);
  border-color: transparent;
  color: #fff;
  font-weight: 500;
  box-shadow: 0 8px 32px rgba(0,0,0,0.22), 0 2px 8px rgba(232,19,42,0.15);
  transform: translateY(-1px);
}
.option-btn.selected::before {
  background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, transparent 60%);
}
.option-indicator {
  width: 19px; height: 19px;
  border-radius: 50%;
  border: 1.5px solid rgba(0,0,0,0.15);
  flex-shrink: 0;
  transition: all 0.22s cubic-bezier(0.34,1.6,0.64,1);
  position: relative;
  background: rgba(255,255,255,0.5);
}
.option-btn:hover .option-indicator {
  border-color: rgba(0,0,0,0.3);
}
.option-btn.selected .option-indicator {
  border-color: rgba(255,255,255,0.3);
  background: var(--red);
  box-shadow: 0 0 0 3px rgba(232,19,42,0.2);
}
.option-btn.selected .option-indicator::after {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%) scale(1);
  width: 7px; height: 7px;
  border-radius: 50%;
  background: white;
  animation: dotPop 0.25s cubic-bezier(0.34,1.8,0.64,1) both;
}
@keyframes dotPop {
  from { transform: translate(-50%,-50%) scale(0); }
  to   { transform: translate(-50%,-50%) scale(1); }
}

/* Options animate in staggered */
.options-grid .option-btn {
  animation: optionIn 0.35s cubic-bezier(0.34,1.3,0.64,1) both;
}
.options-grid .option-btn:nth-child(1) { animation-delay: 0.04s; }
.options-grid .option-btn:nth-child(2) { animation-delay: 0.09s; }
.options-grid .option-btn:nth-child(3) { animation-delay: 0.14s; }
.options-grid .option-btn:nth-child(4) { animation-delay: 0.19s; }
.options-grid .option-btn:nth-child(5) { animation-delay: 0.24s; }
.options-grid .option-btn:nth-child(6) { animation-delay: 0.29s; }
@keyframes optionIn {
  from { opacity: 0; transform: translateY(10px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* ── GRADUATE DECISION CARDS ── */
.grad-card {
  padding: 20px 22px;
  background: rgba(255,255,255,0.7);
  border: 0.5px solid rgba(0,0,0,0.09);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.22s cubic-bezier(0.34,1.4,0.64,1);
  margin-bottom: 10px;
  box-shadow: var(--shadow-option);
  -webkit-tap-highlight-color: transparent;
}
.grad-card:hover {
  transform: translateY(-1px);
  box-shadow: 0 1px 0 rgba(255,255,255,0.9) inset, 0 6px 20px rgba(0,0,0,0.09);
}
.grad-card.selected {
  background: var(--dark);
  border-color: transparent;
  box-shadow: 0 8px 32px rgba(0,0,0,0.22);
  transform: translateY(-1px);
}
.grad-card-header {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 10px;
}
.grad-card-dot {
  width: 20px; height: 20px;
  border-radius: 50%;
  border: 1.5px solid rgba(0,0,0,0.15);
  flex-shrink: 0;
  transition: all 0.22s cubic-bezier(0.34,1.6,0.64,1);
  position: relative;
  background: rgba(255,255,255,0.5);
}
.grad-card.selected .grad-card-dot {
  background: var(--red);
  border-color: rgba(255,255,255,0.3);
  box-shadow: 0 0 0 3px rgba(232,19,42,0.2);
}
.grad-card.selected .grad-card-dot::after {
  content: '';
  position: absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:7px;height:7px;
  border-radius:50%;background:white;
  animation: dotPop 0.25s cubic-bezier(0.34,1.8,0.64,1) both;
}
.grad-card-title {
  font-family: 'Fraunces', serif;
  font-size: 15px; font-weight: 700;
  color: var(--dark);
  transition: color 0.2s;
}
.grad-card.selected .grad-card-title { color: #fff; }
.grad-card-desc {
  font-size: 13px; color: var(--text-2);
  line-height: 1.6;
  padding-left: 32px;
  transition: color 0.2s;
}
.grad-card.selected .grad-card-desc { color: rgba(255,255,255,0.65); }

/* ── COUNTRY SEARCH ── */
.country-search-wrap { position: relative; }
.country-input {
  width: 100%;
  padding: 14px 18px;
  background: rgba(255,255,255,0.75);
  border: 0.5px solid rgba(0,0,0,0.1);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 16px !important;
  outline: none;
  transition: all 0.2s;
  box-shadow: var(--shadow-option);
}
.country-input:focus {
  border-color: rgba(232,19,42,0.4);
  box-shadow: 0 0 0 3px rgba(232,19,42,0.08), var(--shadow-option);
  background: rgba(255,255,255,0.9);
}
.country-input::placeholder { color: var(--text-3); }
.country-dropdown {
  position: absolute;
  top: calc(100% + 6px); left: 0; right: 0;
  z-index: 200;
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 0.5px solid rgba(0,0,0,0.1);
  border-radius: var(--radius-sm);
  max-height: 240px;
  overflow-y: auto;
  display: none;
  box-shadow: 0 20px 60px rgba(0,0,0,0.14), 0 4px 16px rgba(0,0,0,0.08);
  animation: dropIn 0.2s cubic-bezier(0.34,1.4,0.64,1) both;
}
@keyframes dropIn {
  from { opacity: 0; transform: translateY(-6px) scale(0.98); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
.country-option {
  padding: 11px 18px;
  cursor: pointer;
  font-size: 14px;
  color: var(--text);
  transition: background 0.12s;
  min-height: 48px;
  display: flex; align-items: center;
}
.country-option:hover, .country-option.active { background: var(--red-soft); }
.country-no-results {
  padding: 14px 18px;
  font-size: 13px;
  color: var(--text-3);
}

/* ── NAV BUTTONS ── */
.nav-row {
  display: flex; gap: 10px; margin-top: 32px;
  justify-content: space-between; align-items: center;
}
.btn {
  padding: 13px 30px;
  border-radius: var(--radius-pill);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px; font-weight: 600;
  cursor: pointer;
  transition: all 0.22s cubic-bezier(0.34,1.4,0.64,1);
  border: none;
  -webkit-tap-highlight-color: transparent;
  min-height: 50px;
  letter-spacing: 0.01em;
}
.btn-primary {
  background: var(--red);
  color: #fff;
  box-shadow: 0 4px 20px rgba(232,19,42,0.25), 0 1px 0 rgba(255,255,255,0.15) inset;
}
.btn-primary:hover {
  background: var(--red-deep);
  transform: translateY(-1px);
  box-shadow: 0 8px 28px rgba(232,19,42,0.32), 0 1px 0 rgba(255,255,255,0.15) inset;
}
.btn-primary:active { transform: scale(0.98); }
.btn-primary:disabled { opacity: 0.3; cursor: not-allowed; box-shadow: none; transform: none; }
.btn-ghost {
  background: rgba(255,255,255,0.55);
  border: 0.5px solid rgba(0,0,0,0.1);
  color: var(--text-2);
  box-shadow: var(--shadow-option);
}
.btn-ghost:hover {
  background: rgba(255,255,255,0.85);
  color: var(--text);
  transform: translateY(-1px);
}
.btn-ghost:active { transform: scale(0.98); }

/* ── CASE RESULT ── */
.case-result {
  position: relative; overflow: hidden;
  background: var(--glass-bg);
  backdrop-filter: blur(40px) saturate(180%);
  -webkit-backdrop-filter: blur(40px) saturate(180%);
  border: 0.5px solid var(--glass-border);
  border-left: 4px solid var(--red);
  border-radius: var(--radius);
  padding: 28px 32px 28px 28px;
  margin-bottom: 20px;
  box-shadow: var(--shadow-card);
  animation: cardIn 0.4s cubic-bezier(0.34,1.2,0.64,1) both;
}
/* Subtle top-right warmth — very light, not a glow */
.case-result::before {
  content: '';
  position: absolute; top: 0; right: 0;
  width: 180px; height: 120px;
  background: radial-gradient(ellipse at 100% 0%, rgba(232,19,42,0.04) 0%, transparent 70%);
  pointer-events: none;
}
.case-result::after { display: none; }
.case-result-eyebrow {
  font-size: 10.5px; font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 12px;
  display: inline-flex; align-items: center; gap: 8px;
}
/* "✓ Case Assigned" badge */
.case-result-eyebrow-badge {
  display: inline-flex; align-items: center; gap: 5px;
  background: rgba(22,163,74,0.1);
  border: 0.5px solid rgba(22,163,74,0.25);
  color: var(--success);
  padding: 3px 10px 3px 7px;
  border-radius: var(--radius-pill);
  font-size: 10.5px; font-weight: 700;
  letter-spacing: 0.06em;
}
.case-result-eyebrow-badge svg { flex-shrink: 0; }
.case-result-eyebrow-id {
  color: var(--red);
  letter-spacing: 0.14em;
}
.case-result-name {
  font-family: 'Fraunces', serif;
  font-size: 27px; font-weight: 700;
  color: var(--dark);
  letter-spacing: -0.6px;
  line-height: 1.2;
  margin-bottom: 10px;
}
.case-result-explanation {
  font-size: 13.5px; color: var(--text-2);
  line-height: 1.7;
  margin-bottom: 20px;
}
.case-route {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 8px 14px;
  background: rgba(0,0,0,0.04);
  border-radius: 10px;
  border: 0.5px solid var(--border-strong);
}
.route-chip {
  font-size: 11.5px; font-weight: 600;
  padding: 4px 12px;
  border-radius: var(--radius-pill);
}
.route-chip.current {
  background: rgba(0,0,0,0.06);
  color: var(--text-2);
}
.route-chip.target {
  background: var(--red-soft);
  color: var(--red);
  border: 0.5px solid rgba(232,19,42,0.15);
}
.route-arrow { color: var(--text-3); font-size: 13px; }
.warning-card {
  margin-top: 14px;
  background: rgba(217,119,6,0.06);
  border: 0.5px solid rgba(217,119,6,0.2);
  border-radius: 10px;
  padding: 12px 16px;
  font-size: 13px;
  color: #92400e;
  line-height: 1.6;
}

/* ── SECTION DIVIDER ── */
.section-divider {
  display: flex; align-items: center; gap: 16px;
  margin: 36px 0 24px;
}
.section-line { flex: 1; height: 0.5px; background: linear-gradient(90deg, transparent, var(--border-strong), transparent); }
.section-label {
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-3);
  white-space: nowrap;
}

/* ── DOCUMENT GROUPS ── */
.doc-group-title {
  font-size: 10.5px; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--text-3);
  padding-bottom: 10px;
  margin-bottom: 12px;
  margin-top: 32px;
  position: relative;
}
.doc-group-title::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 0.5px;
  background: linear-gradient(90deg, var(--border-strong) 0%, transparent 100%);
}
.doc-group-title:first-child { margin-top: 0; }

/* ── DOCUMENT ITEMS — elevated cards ── */
.doc-item {
  background: rgba(255,255,255,0.75);
  border: 0.5px solid rgba(255,255,255,0.7);
  border-radius: var(--radius-sm);
  padding: 18px 20px;
  margin-bottom: 10px;
  display: flex; gap: 14px; align-items: flex-start;
  box-shadow: var(--shadow-option);
  transition: all 0.2s cubic-bezier(0.34,1.3,0.64,1);
  animation: docIn 0.35s cubic-bezier(0.34,1.2,0.64,1) both;
  position: relative;
  overflow: hidden;
}
.doc-item::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.9), transparent);
  pointer-events: none;
}
.doc-item:hover {
  transform: translateY(-1px);
  box-shadow: 0 1px 0 rgba(255,255,255,0.9) inset, 0 8px 28px rgba(0,0,0,0.09);
}
@keyframes docIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.doc-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 8px;
  box-shadow: 0 0 0 3px rgba(255,255,255,0.8);
}
.doc-dot-mandatory {
  background: radial-gradient(circle at 35% 35%, #FF4D60, var(--red));
  box-shadow: 0 0 0 2px rgba(232,19,42,0.15), 0 0 0 4px rgba(232,19,42,0.06);
}
.doc-dot-conditional { background: var(--warning); }
.doc-dot-conditional {
  background: radial-gradient(circle at 35% 35%, #FCD34D, var(--warning));
  box-shadow: 0 0 0 2px rgba(217,119,6,0.15), 0 0 0 4px rgba(217,119,6,0.06);
}
.doc-dot-optional {
  background: radial-gradient(circle at 35% 35%, #4ADE80, var(--success));
  box-shadow: 0 0 0 2px rgba(22,163,74,0.15), 0 0 0 4px rgba(22,163,74,0.06);
}
/* Left border colour per category */
.doc-item-mandatory { border-left: 2.5px solid rgba(232,19,42,0.35) !important; }
.doc-item-conditional { border-left: 2.5px solid rgba(217,119,6,0.35) !important; }
.doc-item-optional { border-left: 2.5px solid rgba(22,163,74,0.35) !important; }
.doc-body { flex: 1; min-width: 0; }
.doc-name-en {
  font-size: 14px; font-weight: 500;
  color: var(--dark);
  margin-bottom: 4px;
  line-height: 1.4;
}
.doc-name-pl {
  font-size: 12px; color: #1e3a5f;
  margin-bottom: 10px;
  opacity: 0.9;
}
.doc-tags {
  display: flex; flex-wrap: wrap; gap: 5px;
}
.doc-tag {
  font-size: 10.5px; font-weight: 600;
  letter-spacing: 0.04em;
  padding: 3px 9px;
  border-radius: 6px;
  text-transform: uppercase;
}
.tag-mandatory { background: var(--red-soft); color: var(--red); }
.tag-conditional { background: rgba(217,119,6,0.08); color: var(--warning); }
.tag-optional { background: rgba(22,163,74,0.08); color: var(--success); }
.tag-source {
  background: rgba(0,0,0,0.05);
  color: var(--text-3);
  font-weight: 500;
  text-transform: none;
  letter-spacing: 0;
}
.doc-notes {
  margin-top: 8px;
  font-size: 12px; color: var(--text-3);
  font-style: italic;
  padding: 6px 10px;
  background: rgba(0,0,0,0.03);
  border-radius: 6px;
  line-height: 1.5;
}

/* ── RESET ── */
.reset-btn {
  display: block;
  margin: 40px auto 0;
  padding: 12px 32px;
  background: transparent;
  border: 0.5px solid var(--border-strong);
  border-radius: var(--radius-pill);
  color: var(--text-3);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px; font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.reset-btn:hover { border-color: var(--red); color: var(--red); }

@keyframes panelIn {
  from { opacity: 0; transform: translateY(-4px) scale(0.98); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* ── STICKY BOTTOM CTA (mobile) ── */
.sticky-cta {
  display: none;
}
@media (max-width: 600px) {

// ─── INFO LABEL LOOKUP ────────────────────────────────────────────────────
// Maps document type to short smart label for the expand button
function getInfoLabel(docEn) {
  const d = docEn.toLowerCase();
  if (d.includes('photo'))              return 'Requirements';
  if (d.includes('passport'))           return 'What to prepare';
  if (d.includes('stamp duty') || d.includes('payment confirmation')) return 'How to pay';
  if (d.includes('application') || d.includes('wniosek'))  return 'Where to find';
  if (d.includes('health insurance') || d.includes('ubezpieczenie')) return 'What qualifies';
  if (d.includes('bank') || d.includes('financial means') || d.includes('funds')) return 'What to show';
  if (d.includes('accommodation') || d.includes('rental') || d.includes('zamieszkania')) return 'What to show';
  if (d.includes('certificate') || d.includes('zaświadczenie') || d.includes('university') || d.includes('diploma')) return 'Where to get';
  if (d.includes('zus') || d.includes('social insurance')) return 'How to obtain';
  if (d.includes('tax') || d.includes('pit') || d.includes('podatk')) return 'How to obtain';
  if (d.includes('employer') || d.includes('annex') || d.includes('załącznik') || d.includes('krs') || d.includes('ceidg')) return 'Employer provides';
  if (d.includes('contract') || d.includes('umowa'))  return 'What to include';
  if (d.includes('pesel'))              return 'Where to get';
  if (d.includes('residence card') || d.includes('karta pobytu') || d.includes('decision') || d.includes('decyzja')) return 'What to bring';
  if (d.includes('birth cert') || d.includes('marriage cert') || d.includes('translation')) return 'What to prepare';
  if (d.includes('work permit') || d.includes('zezwolenie na pracę')) return 'Employer provides';
  return 'Details';
}

const DOCUMENT_MATRIX = {
  'CT-01': [
    { pl: 'Wniosek o pobyt czasowy', en: 'Temporary residence permit application', ru: 'Заявление', condition: 'ALWAYS', source: 'Wnioskodawca', notes: '2 egzemplarze (2 copies required)', info: 'Fill in the official application form online at the MOS portal: <a href="https://mos.cudzoziemcy.gov.pl/en/wniosek" target="_blank">mos.cudzoziemcy.gov.pl/en/wniosek</a> (available in English, Ukrainian, Russian and 4 other languages). From 2026, applications are submitted electronically through MOS — no paper forms needed. Fill in all fields clearly in Polish using block capital letters. You need to print 2 copies — one for submission, one for your records. Both must be signed.' },
    { pl: 'Ważny paszport + kopia wszystkich stron z pieczątkami', en: 'Valid passport + copy of all pages with stamps', ru: 'Паспорт + копии всех страниц с отметками', condition: 'ALWAYS', source: 'Wnioskodawca', notes: null, info: 'Your passport must be valid for the entire intended period of stay. Make a photocopy of every page that has a stamp, visa, or entry/exit mark — including the photo page and signature page. The office requires the original for inspection and keeps the copies.' },
    { pl: 'Zdjęcia', en: 'Photos', ru: 'Фото', condition: 'ALWAYS', source: 'Wnioskodawca', notes: '2 photos, 3.5×4.5 cm, 80% face visible', info: 'You need 2 photographs. Size: 3.5 cm × 4.5 cm (same as passport photos). The face must fill 70–80% of the frame. Plain light background, no headwear (unless for religious reasons), no glasses. Photos must be taken no more than 6 months before submission. Standard passport photo booths or photo studios work fine.' },
    { pl: 'Zaświadczenie z uczelni o przyjęciu na studia', en: 'Certificate from university confirming admission', ru: 'Справка из университета о зачислении на обучение', condition: 'IF_NEW_STUDENT', source: 'Uczelnia (University)', notes: 'Only for new students starting their programme', info: 'Obtain this from your university\'s Dean\'s Office (Dziekanat) or International Student Office. It must confirm your full name, programme name, academic year, and form of study (full-time/stacjonarne). It should be on university letterhead and stamped. Request it at least 1–2 weeks before your application date.' },
    { pl: 'Zaświadczenie z uczelni o kontynuacji studiów', en: 'Certificate from university confirming continuation of studies', ru: 'Справка из университета о продолжении обучения', condition: 'IF_CONTINUING_STUDENT', source: 'Uczelnia (University)', notes: 'Only for students continuing the same programme', info: 'Obtain from your Dziekanat or International Office. This must confirm that you are an active enrolled student continuing your current programme into the next academic year. It should include your name, student ID, programme, and expected graduation date. Request it at the start of a new semester.' },
    { pl: 'Wydruk karty okresowych osiągnięć studenta', en: 'Printout of student academic progress record', ru: 'Распечатка карты периодических достижений студента', condition: 'IF_CONTINUING_STUDENT', source: 'Uczelnia (University)', notes: 'Only for continuing students — shows credits/grades', info: 'This is a printout from your university\'s student system (e.g. USOS) showing all completed subjects, grades, and credit points. Log in to your student portal, navigate to academic progress or transcript, and print or export the full record. It must show your name, student ID, and all completed semesters. Stamp from the Dziekanat is recommended.' },
    { pl: 'Potwierdzenie opłaty za studia', en: 'Tuition payment confirmation', ru: 'Подтверждение оплаты за обучение', condition: 'ALWAYS', source: 'Uczelnia (University)', notes: null, info: 'A receipt or bank transfer confirmation showing that you have paid your tuition fees for the current and/or upcoming academic year. This can be a printout from your bank, a payment confirmation email from the university, or an official receipt. It must show your name, the amount, and the academic year.' },
    { pl: 'Ubezpieczenie zdrowotne', en: 'Health insurance', ru: 'Медицинская страховка', condition: 'ALWAYS', source: 'Wnioskodawca', notes: null, info: 'Must cover your full planned period of stay in Poland. Accepted forms: private health insurance policy from a recognised insurer (e.g. Allianz, Generali, AXA, PZU), EKUZ card (EU citizens), or ZUS registration (if employed). The policy must be in your name and show the coverage period, scope (medical treatment in Poland), and insured amount — minimum recommended coverage is €30,000. A printout of the policy confirmation is sufficient.' },
    { pl: 'Dokument potwierdzający posiadanie środków finansowych', en: 'Document confirming sufficient financial means', ru: 'Документ, подтверждающий наличие финансовых средств', condition: 'ALWAYS', source: 'Wnioskodawca', notes: null, info: 'A bank statement from your account, issued no more than 1 month before submission. Must show your full name, account number, and sufficient balance. For students, the required amount should cover: living expenses (minimum ~1,010 PLN per month), accommodation costs (rent + utilities), and a return ticket (~2,500 PLN). For an academic year (10 months) the recommended total is approximately 15,000–20,000 PLN depending on your rent. Sponsor support letters with bank statements are also accepted if someone else is financing your stay.' },
    { pl: 'Dokument potwierdzający miejsce zamieszkania w Polsce', en: 'Proof of accommodation in Poland with information about fixed costs', ru: 'Документ, подтверждающий место проживания в Польше', condition: 'ALWAYS', source: 'Wnioskodawca', notes: null, info: 'A rental agreement (umowa najmu) showing your name, address, monthly rent amount, and duration. Must cover the intended period of stay. If you live in a student dormitory, a confirmation letter from the dormitory administration suffices. If staying with family or friends, a notarised declaration of accommodation (oświadczenie o udostępnieniu lokalu) is required along with the property owner\'s ID copy.' },
    { pl: 'Potwierdzenie opłaty skarbowej 340 złotych', en: 'Stamp duty payment confirmation 340 PLN', ru: 'Подтверждение оплаты гербового сбора 340 злотых', condition: 'ALWAYS', source: 'Wnioskodawca', notes: null, info: 'The stamp duty for this application type is <strong>340 PLN</strong>. Payment must be made to your Voivodeship Office bank account — this is <strong>different in every city in Poland</strong> (Warsaw, Kraków, Wrocław, Gdańsk etc. all have different accounts). <br><br>⚠️ <strong>Do not use any account number found online.</strong> Before making payment, confirm the correct account number with your local Voivodeship Office website or contact us at KartaFlow. Paying to the wrong account can delay your application and refunds are not automatic.<br><br>Alongside this fee, you will also pay a separate <strong>100 PLN card issuance fee</strong> when collecting your decision — this goes to a different account and you will be informed at that stage.' },
    { pl: 'Numer PESEL + kopia', en: 'PESEL number + copy', ru: 'Номер PESEL + копия', condition: 'IF_AVAILABLE', source: 'Wnioskodawca', notes: null, info: 'If you already have a PESEL number, include a document confirming it (e.g. the confirmation letter issued when PESEL was assigned, or a meldunek/registration document). Make a copy. If you do not have a PESEL yet, this is not required — you will be assigned one during the TRC process.' },
  ],
  'CT-02': [

    { pl: 'Ważny paszport + kopia wszystkich stron z pieczątkami', en: 'Valid passport + copy of all pages with stamps', ru: 'Паспорт + копии всех страниц с отметками', condition: 'ALWAYS', source: 'Wnioskodawca', notes: null, info: 'Passport must be valid for the full planned stay. Photocopy every page with a stamp, visa, or entry/exit mark, plus the photo page. Original shown for inspection; copies kept by the office.' },

    { pl: 'Karta pobytu + ksero', en: 'Residence card + copy', ru: 'Карта побыта + копия', condition: 'ALWAYS', source: 'Wnioskodawca', notes: null, info: 'Your current TRC (Karta Pobytu). Bring the original and a photocopy of both sides. The office inspects the original and retains the copy.' },
    { pl: 'Decyzja na pobyt + ksero', en: 'Residence decision + copy', ru: 'Решение по карcie + копия', condition: 'ALWAYS', source: 'Wnioskodawca', notes: null, info: 'The administrative decision (decyzja) you received when your current TRC was granted — a multi-page A4 document. Bring original and photocopy of all pages.' },
    { pl: 'Zaświadczenie z uczelni o przyjęciu na studia (nowy program)', en: 'Certificate from university confirming admission to new programme', ru: 'Справка из университета о зачислении на новую программу', condition: 'IF_NEW_PROGRAMME', source: 'Uczelnia (University)', notes: 'Only if starting a new study programme', info: 'Required when switching to a different programme. Obtain from the Dziekanat or International Office. Must confirm: your name, new programme name, academic year, and form of study (full-time / stacjonarne). University letterhead and stamp required.' },
    { pl: 'Zaświadczenie z uczelni o kontynuacji studiów', en: 'Certificate from university confirming continuation of studies', ru: 'Справка из университета о продолжении обучения', condition: 'IF_CONTINUING_PROGRAMME', source: 'Uczelnia (University)', notes: 'Only if continuing the same programme', info: 'Obtain from your Dziekanat or International Office. Must confirm you remain an active enrolled student in the same programme, with your name, student ID, programme, and expected graduation date. University stamp required.' },
    { pl: 'Wydruk karty okresowych osiągnięć studenta', en: 'Printout of student academic progress record', ru: 'Распечатка карты периодических достижений студента', condition: 'IF_CONTINUING_PROGRAMME', source: 'Uczelnia (University)', notes: 'Only for continuing students — shows all credits and grades', info: 'Full transcript printout from your student portal (e.g. USOS). Shows completed courses, grades, and credit points per semester. Log in, navigate to academic record, and export or print. Dziekanat stamp strongly recommended.' },
    { pl: 'Potwierdzenie opłaty za studia', en: 'Tuition payment confirmation', ru: 'Подтверждение оплаты за обучение', condition: 'ALWAYS', source: 'Uczelnia (University)', notes: null, info: 'Bank transfer receipt or university payment confirmation showing your name, amount, and academic year. Can be a bank printout, payment confirmation email, or official university receipt.' },
    { pl: 'Ubezpieczenie zdrowotne', en: 'Health insurance', ru: 'Медицинская страховка', condition: 'ALWAYS', source: 'Wnioskodawca', notes: null, info: 'Must cover your full intended stay in Poland. Accepted: private insurance (PZU, Allianz, AXA, Generali), ZUS registration if employed, or EKUZ (EU citizens). Policy in your name with dates and coverage amount visible. Minimum recommended: €30,000.' },
    { pl: 'Dokument potwierdzający posiadanie środków finansowych', en: 'Document confirming sufficient financial means', ru: 'Документ, подтверждающий наличие финансовых средств', condition: 'ALWAYS', source: 'Wnioskodawca', notes: null, info: 'Bank statement issued within the last month showing your name and sufficient balance. For students: minimum ~1,010 PLN/month for living, plus rent and utilities, plus ~2,500 PLN return ticket. Recommend showing 15,000–20,000 PLN for a full academic year. Sponsor letter + their bank statement also accepted.' },
    { pl: 'Dokument potwierdzający miejsce zamieszkania w Polsce', en: 'Proof of accommodation in Poland with fixed costs', ru: 'Документ, подтверждающий место проживания в Польше', condition: 'ALWAYS', source: 'Wnioskodawca', notes: null, info: 'Rental agreement with your name, address, monthly cost, and duration. Dormitory: letter from administration. Staying with others: notarised declaration from property owner plus their ID copy.' },
    { pl: 'Potwierdzenie opłaty skarbowej 340 złotych', en: 'Stamp duty payment confirmation 340 PLN', ru: 'Подтверждение оплаты гербового сбора 340 злотых', condition: 'ALWAYS', source: 'Wnioskodawca', notes: null, info: 'The stamp duty for this application type is <strong>340 PLN</strong>. Payment must be made to your Voivodeship Office bank account — this is <strong>different in every city in Poland</strong> (Warsaw, Kraków, Wrocław, Gdańsk etc. all have different accounts). <br><br>⚠️ <strong>Do not use any account number found online.</strong> Before making payment, confirm the correct account number with your local Voivodeship Office website or contact us at KartaFlow. Paying to the wrong account can delay your application and refunds are not automatic.<br><br>Alongside this fee, you will also pay a separate <strong>100 PLN card issuance fee</strong> when collecting your decision — this goes to a different account and you will be informed at that stage.' },
    { pl: 'Numer PESEL + kopia', en: 'PESEL number + copy', ru: 'Номер PESEL + копия', condition: 'IF_AVAILABLE', source: 'Wnioskodawca', notes: null, info: 'If you have a PESEL, include the confirmation document and a copy. Not required if you do not yet have one.' },

    { pl: 'Ważny paszport + kopia wszystkich stron z pieczątkami', en: 'Valid passport + copy of all pages with stamps', ru: 'Паспорт + копии всех страниц с отметками', condition: 'ALWAYS', source: 'Wnioskodawca', notes: null, info: 'Passport must be valid for the full intended stay. Photocopy all pages with stamps, visas, or entry/exit marks. Original for inspection, copies retained.' },

    { pl: 'Dyplom + kopia', en: 'Diploma (university graduation certificate) + copy', ru: 'Диплом об окончании университета + копия', condition: 'ALWAYS', source: 'Wnioskodawca', notes: null, info: 'Your official graduation diploma issued by a Polish university or college. Bring the original and a photocopy. If the diploma is in a language other than Polish, a sworn translation (tłumaczenie przysięgłe) may also be needed — confirm with your local Voivodeship office.' },
    { pl: 'Ubezpieczenie zdrowotne', en: 'Health insurance', ru: 'Медицинская страховка', condition: 'ALWAYS', source: 'Wnioskodawca', notes: null, info: 'Private insurance covering your stay in Poland. Must be in your name with dates and minimum coverage of €30,000. Providers: PZU, Allianz, Generali, AXA. If employed, ZUS registration is accepted instead.' },

    { pl: 'Dokument potwierdzający miejsce zamieszkania w Polsce', en: 'Proof of accommodation in Poland with fixed costs', ru: 'Документ, подтверждающий место проживания в Польше', condition: 'ALWAYS', source: 'Wnioskodawca', notes: null, info: 'Rental agreement in your name showing address, monthly rent, and duration. If staying with others, a notarised declaration of accommodation from the property owner is required.' },
    { pl: 'Potwierdzenie opłaty skarbowej 340 złotych', en: 'Stamp duty payment confirmation 340 PLN', ru: 'Подтверждение оплаты гербового сбора 340 злотых', condition: 'ALWAYS', source: 'Wnioskodawca', notes: null, info: 'The stamp duty for this application type is <strong>340 PLN</strong>. Payment must be made to your Voivodeship Office bank account — this is <strong>different in every city in Poland</strong> (Warsaw, Kraków, Wrocław, Gdańsk etc. all have different accounts). <br><br>⚠️ <strong>Do not use any account number found online.</strong> Before making payment, confirm the correct account number with your local Voivodeship Office website or contact us at KartaFlow. Paying to the wrong account can delay your application and refunds are not automatic.<br><br>Alongside this fee, you will also pay a separate <strong>100 PLN card issuance fee</strong> when collecting your decision — this goes to a different account and you will be informed at that stage.' },

    { pl: 'Decyzja na pobyt + ksero', en: 'Residence decision + copy', ru: 'Решение по карте + копия', condition: 'IF_ON_TRC', source: 'Wnioskodawca', notes: null, info: 'The administrative decision (decyzja) for your current TRC. Bring original and photocopy of all pages.' },

  'CT-04': [
    { pl: 'Wniosek o pobyt czasowy', en: 'Temporary residence permit application', ru: 'Заявление', condition: 'ALWAYS', source: 'Wnioskodawca', notes: '2 egzemplarze (2 copies required)', info: 'Fill in and submit via the MOS portal: <a href="https://mos.cudzoziemcy.gov.pl/en/wniosek" target="_blank">mos.cudzoziemcy.gov.pl/en/wniosek</a> (English, Ukrainian, Russian available). Select the work basis (praca). Print 2 copies, complete in Polish block capitals, sign both. Apply before your study TRC expires.' },
    { pl: 'Ważny paszport + kopia wszystkich stron z pieczątkami', en: 'Valid passport + copy of all pages with stamps', ru: 'Паспорт + копии всех страниц с отметками', condition: 'ALWAYS', source: 'Wnioskodawca', notes: null, info: 'Passport must be valid for full intended stay. Photocopy all stamped, visa, and entry/exit pages plus the photo page.' },
    { pl: 'Zdjęcia', en: 'Photos', ru: 'Фото', condition: 'ALWAYS', source: 'Wnioskodawca', notes: '2 photos, 3.5×4.5 cm, 80% face visible', info: '2 photographs, 3.5×4.5 cm. Plain light background, no glasses, no headwear. Face 70–80% of frame. Taken within last 6 months.' },
    { pl: 'Karta pobytu + ksero', en: 'Residence card + copy', ru: 'Карта побыта + копия', condition: 'ALWAYS', source: 'Wnioskodawca', notes: null, info: 'Your current study TRC card. Original for inspection, photocopy of both sides.' },
    { pl: 'Decyzja na pobyt + ksero', en: 'Residence decision + copy', ru: 'Решение по карте + копия', condition: 'ALWAYS', source: 'Wnioskodawca', notes: null, info: 'The administrative decision from your current study TRC. Original and photocopy of all pages.' },
    { pl: 'Umowa o pracę / zlecenia', en: 'Employment contract or mandate contract (umowa zlecenia)', ru: 'Трудовой договор / договор поручения', condition: 'ALWAYS', source: 'Wnioskodawca', notes: null, info: 'Your signed employment contract (umowa o pracę) or mandate contract (umowa zlecenia). Must be signed by both you and the employer. Must show: employer name, your name, position, salary (at least minimum wage — 4,666 PLN gross in 2025), start date, and duration.' },
    { pl: 'ZUS ZUA wraz z potwierdzeniem wysłania do ZUS', en: 'ZUS ZUA social insurance registration with submission confirmation', ru: 'ZUS ZUA — регистрация в системе соцстрахования с подтверждением', condition: 'IF_NOT_STUDENT', source: 'Wnioskodawca', notes: 'Required if you are not a student — confirms you are registered for social insurance', info: 'ZUS ZUA is the form your employer submits to register you for full social insurance (not just health insurance). Ask your employer for a copy of the ZUS ZUA form along with the confirmation (UPO) of its submission to ZUS. If you are registered in ZUS PUE, you can log in and download it yourself at <a href="https://www.zus.pl/portal/logowanie.npi" target="_blank">zus.pl</a>.' },
    { pl: 'Prywatne ubezpieczenie zdrowotne', en: 'Private health insurance', ru: 'Частная медицинская страховка', condition: 'IF_STUDENT_ON_ZLECENIE', source: 'Wnioskodawca', notes: 'Required if you are a student working under umowa zlecenia', info: 'Students working under umowa zlecenia are not automatically covered by ZUS health insurance. You need a private health insurance policy covering your period of stay in Poland. Minimum coverage: €30,000. Providers: PZU, Allianz, Generali, AXA.' },
    { pl: 'Potwierdzenie opłaty skarbowej 440 złotych', en: 'Stamp duty payment confirmation 440 PLN', ru: 'Подтверждение оплаты гербового сбора 440 злотых', condition: 'ALWAYS', source: 'Wnioskodawca', notes: null, info: 'The stamp duty for a work-based TRC is <strong>440 PLN</strong>. Payment must be made to your Voivodeship Office bank account — this is <strong>different in every city in Poland</strong> (Warsaw, Kraków, Wrocław, Gdańsk etc. all have different accounts).<br><br>⚠️ <strong>Do not use any account number found online.</strong> Before making payment, confirm the correct account number with your local Voivodeship Office website or contact us at KartaFlow. Paying to the wrong account can delay your application and refunds are not automatic.<br><br>Alongside this fee, you will also pay a separate <strong>100 PLN card issuance fee</strong> when collecting your decision — this goes to a different account and you will be informed at that stage.' },
    { pl: 'Numer PESEL + kopia', en: 'PESEL number + copy', ru: 'Номер PESEL + копия', condition: 'IF_AVAILABLE', source: 'Wnioskodawca', notes: null, info: 'If you have a PESEL, include confirmation document and copy.' },
    { pl: 'Załącznik nr 1', en: 'Annex No. 1 — employer form (Załącznik nr 1)', ru: 'Приложение № 1 — форма работодателя', condition: 'ALWAYS', source: 'Pracodawca (Employer)', notes: null, info: 'A specific official form that your employer must complete and sign. It confirms details about the job offer and your employment conditions. Download the current Załącznik nr 1 from the MOS portal or your Voivodeship Office website. Ask your HR to fill it in, sign, and stamp. Under MOS v2 (2026), employers sign this digitally through the portal.' },
    { pl: 'Oświadczenie podmiotu powierzającego wykonywanie pracy', en: "Employer's statement confirming business activity and financial resources", ru: 'Заявление работодателя о хозяйственной деятельности и финансовых ресурсах', condition: 'ALWAYS', source: 'Pracodawca (Employer)', notes: null, info: 'A formal declaration by the employer confirming that: their business is genuinely active, they have sufficient financial resources to employ you, and all conditions of employment will be met. Must be on company letterhead, signed by an authorised representative, and stamped. Your employer or HR department prepares this.' },
    { pl: 'Wydruk KRS/CEIDG', en: 'KRS/CEIDG register extract (employer registration)', ru: 'Выписка из реестра KRS / CEIDG', condition: 'IF_AVAILABLE', source: 'Pracodawca (Employer)', notes: null, info: 'A printout confirming the employer company is officially registered in Poland. For companies: KRS extract from <a href="https://ekrs.ms.gov.pl" target="_blank">ekrs.ms.gov.pl</a> (free, instant). For sole traders: CEIDG extract from <a href="https://www.ceidg.gov.pl" target="_blank">ceidg.gov.pl</a> (free, instant). Print on day of submission for most current version.' },
  ],

    { pl: 'Ważny paszport + kopia wszystkich stron z pieczątkami', en: 'Valid passport + copy of all pages with stamps', ru: 'Паспорт + копии всех страниц с отметками', condition: 'ALWAYS', source: 'Wnioskodawca', notes: null, info: 'Passport must be valid for the full planned stay. Photocopy all stamped, visa, and entry/exit pages plus the photo page.' },
    { pl: 'Zdjęcia', en: 'Photos', ru: 'Фото', condition: 'ALWAYS', source: 'Wnioskodawca', notes: '2 photos, 3.5×4.5 cm, 80% face visible', info: '2 photographs, 3.5×4.5 cm. Plain light background, no glasses, no headwear. Face 70–80% of frame. Taken within last 6 months.' },
    { pl: 'Umowa o pracę / zlecenia - kopia', en: 'Employment contract or mandate contract (copy)', ru: 'Копия трудового договора / договора поручения', condition: 'ALWAYS', source: 'Wnioskodawca', notes: null, info: 'Your signed employment or mandate contract. Must show: employer name, your name, position, salary (minimum 4,666 PLN gross in 2025), start date, and duration. Bring a copy — the original may also be requested for inspection.' },
    { pl: 'Oświadczenie wnioskodawcy', en: 'Applicant statement form (Oświadczenie)', ru: 'Заявление-декларация заявителя', condition: 'ALWAYS', source: 'Wnioskodawca', notes: 'Applicant personal declaration — template from Voivodeship office', info: 'A formal declaration you must complete confirming your personal information, address, and the details of your application. The template is provided by your Voivodeship Office — download it from your office website or ask for it when you register your appointment. Fill in all fields clearly, sign, and include with your application package.' },
    { pl: 'ZUS ZUA wraz z potwierdzeniem wysłania do ZUS (ostatnie 1–3 miesiące)', en: 'ZUS ZUA social insurance registration with confirmation — last 1–3 months', ru: 'ZUS ZUA за последние 1–3 месяца с подтверждением отправки в ZUS', condition: 'IF_NOT_STUDENT', source: 'Wnioskodawca', notes: 'Required if NOT a student', info: 'ZUS ZUA confirms you are registered for social insurance. Request the last 1–3 months of ZUS ZUA confirmations from your employer, or log in to ZUS PUE at <a href="https://www.zus.pl/portal/logowanie.npi" target="_blank">zus.pl</a> to download confirmation yourself. Covers the period of employment you are declaring.' },
    { pl: 'Rachunki do umowy zlecenia', en: 'Invoices / settlement receipts for mandate contract (rachunki)', ru: 'Счета/квитанции по договору поручения', condition: 'IF_STUDENT_ON_ZLECENIE', source: 'Wnioskodawca', notes: 'If working under umowa zlecenia (mandate contract)', info: 'If you work under a mandate contract (umowa zlecenia), you need the signed payment receipts (rachunki) showing the work performed and amount paid for each settlement period. Your employer provides these. Bring the last 3–6 months.' },
    { pl: 'Zeznanie podatkowe PIT za poprzedni rok', en: 'Annual tax declaration (PIT) for previous tax year', ru: 'Налоговая декларация PIT за предыдущий налоговый год', condition: 'IF_WORKED_PREVIOUS_YEAR', source: 'Wnioskodawca', notes: 'If you worked in Poland in the previous calendar year', info: 'Your annual tax return (PIT-37 or PIT-36) for the previous year, confirming your income. File it online for free at <a href="https://www.podatki.gov.pl" target="_blank">podatki.gov.pl</a> using Twój e-PIT (auto-filled from employer data). Download the submitted and accepted version (with UPO confirmation). Deadline each year: 30 April.' },
    { pl: 'Zaświadczenie US o niezaleganiu w podatkach (wnioskodawca)', en: 'Tax office certificate of no tax arrears — applicant', ru: 'Справка из налоговой об отсутствии задолженности — заявитель', condition: 'IF_WORKED_PREVIOUS_YEAR', source: 'Wnioskodawca', notes: 'If you worked in Poland — may be requested', info: 'A certificate from the Polish tax office (Urząd Skarbowy) confirming you have no outstanding tax liabilities. Apply in person at your local Urząd Skarbowy or online via ePUAP at <a href="https://www.podatki.gov.pl" target="_blank">podatki.gov.pl</a>. Processing time: up to 7 days. Fee: 21 PLN.' },
    { pl: 'Prywatne ubezpieczenie zdrowotne', en: 'Private health insurance', ru: 'Частная медицинская страховка', condition: 'IF_STUDENT_ON_ZLECENIE', source: 'Wnioskodawca', notes: 'Only if student on umowa zlecenia', info: 'Students on umowa zlecenia are not automatically covered by ZUS health insurance. You need a private policy in your name covering your stay. Minimum €30,000. Providers: PZU, Allianz, AXA, Generali.' },
    { pl: 'Numer PESEL + kopia', en: 'PESEL number + copy', ru: 'Номер PESEL + копия', condition: 'IF_AVAILABLE', source: 'Wnioskodawca', notes: null, info: 'Include PESEL confirmation document and copy if you have one.' },
    { pl: 'Potwierdzenie opłaty skarbowej 440 złotych', en: 'Stamp duty payment confirmation 440 PLN', ru: 'Подтверждение оплаты гербового сбора 440 злотых', condition: 'ALWAYS', source: 'Wnioskodawca', notes: null, info: 'The stamp duty for a work-based TRC is <strong>440 PLN</strong>. Payment must be made to your Voivodeship Office bank account — this is <strong>different in every city in Poland</strong> (Warsaw, Kraków, Wrocław, Gdańsk etc. all have different accounts).<br><br>⚠️ <strong>Do not use any account number found online.</strong> Before making payment, confirm the correct account number with your local Voivodeship Office website or contact us at KartaFlow. Paying to the wrong account can delay your application and refunds are not automatic.<br><br>Alongside this fee, you will also pay a separate <strong>100 PLN card issuance fee</strong> when collecting your decision — this goes to a different account and you will be informed at that stage.' },
    { pl: 'Załącznik nr 1', en: 'Annex No. 1 — employer form (Załącznik nr 1)', ru: 'Приложение № 1 — форма работодателя', condition: 'ALWAYS', source: 'Pracodawca (Employer)', notes: null, info: 'Official form your employer must complete and sign, confirming your employment details. Download from <a href="https://www.gov.pl/web/mswia" target="_blank">gov.pl</a> and ask your HR to fill and stamp it.' },
    { pl: 'Oświadczenie podmiotu powierzającego wykonywanie pracy', en: "Employer's statement confirming business activity and financial resources", ru: 'Заявление работодателя о хозяйственной деятельности и финансовых ресурсах', condition: 'ALWAYS', source: 'Pracodawca (Employer)', notes: null, info: 'Formal employer declaration on company letterhead confirming: active business, financial ability to pay your salary, and genuine employment conditions. Signed and stamped by authorised company representative.' },
    { pl: 'Wydruk KRS/CEIDG', en: 'KRS/CEIDG register extract (employer registration)', ru: 'Выписка из реестра KRS / CEIDG', condition: 'IF_AVAILABLE', source: 'Pracodawca (Employer)', notes: null, info: 'Free printout of employer registration. Companies: <a href="https://ekrs.ms.gov.pl" target="_blank">ekrs.ms.gov.pl</a>. Sole traders: <a href="https://www.ceidg.gov.pl" target="_blank">ceidg.gov.pl</a>. Print on submission day for most current data.' },
    { pl: 'Zezwolenie na pracę', en: 'Work permit (type A / oświadczenie / zawiadomienie)', ru: 'Разрешение на работу (тип A / объявление)', condition: 'IF_NO_ACCESS_TO_LABOUR_MARKET', source: 'Pracodawca (Employer)', notes: 'Only if you do not have automatic access to the Polish labour market', info: 'Required for nationalities that need a formal work authorisation. Your employer applies for this at the Voivodeship Office (zezwolenie na pracę type A) or registers an oświadczenie at PUP. Ukrainian citizens (from 2022) and Polish university graduates are generally exempt. Check your nationality\'s status with your advisor.' },
    { pl: 'Zaświadczenie US o niezaleganiu w podatkach (pracodawca)', en: 'Tax office certificate of no tax arrears — employer', ru: 'Справка из налоговой об отсутствии задолженности — работодатель', condition: 'ALWAYS', source: 'Pracodawca (Employer)', notes: null, info: 'Employer\'s tax clearance certificate from their Urząd Skarbowy. Confirms the company has no outstanding tax liabilities. Employer obtains this in person or via ePUAP. Valid for 3 months from issue date.' },
    { pl: 'Zaświadczenie ZUS o braku zaległości w opłacaniu składek (pracodawca)', en: 'ZUS certificate of no contribution arrears — employer', ru: 'Справка из ZUS об отсутствии задолженности по взносам — работодатель', condition: 'ALWAYS', source: 'Pracodawca (Employer)', notes: null, info: 'Employer\'s certificate from ZUS confirming no outstanding social insurance contribution debts. Employer requests this at the local ZUS office or online via PUE ZUS at <a href="https://www.zus.pl" target="_blank">zus.pl</a>. Valid for 3 months.' },
  ],
  'CT-06': [
    { pl: 'Wniosek o pobyt czasowy', en: 'Temporary residence permit application', ru: 'Заявление', condition: 'ALWAYS', source: 'Wnioskodawca', notes: '2 egzemplarze (2 copies required)', info: 'Fill in and submit via the MOS portal: <a href="https://mos.cudzoziemcy.gov.pl/en/wniosek" target="_blank">mos.cudzoziemcy.gov.pl/en/wniosek</a> (English, Ukrainian, Russian available). Select work basis. Print 2 copies, fill in Polish block capitals, sign both. Submit before your current TRC expires.' },

    { pl: 'Umowa o pracę / zlecenia', en: 'Employment contract or mandate contract', ru: 'Трудовой договор / договор поручения', condition: 'ALWAYS', source: 'Wnioskodawca', notes: null, info: 'Your current signed employment or mandate contract. Must show: employer, your name, position, salary (minimum 4,666 PLN gross in 2025), start date, duration.' },
    { pl: 'ZUS ZUA wraz z potwierdzeniem wysłania do ZUS', en: 'ZUS ZUA registration with submission confirmation', ru: 'ZUS ZUA с подтверждением отправки', condition: 'IF_NOT_STUDENT', source: 'Wnioskodawca', notes: 'If not a student', info: 'Last 1–3 months of ZUS ZUA confirmations. Request from employer or download from PUE ZUS at <a href="https://www.zus.pl/portal/logowanie.npi" target="_blank">zus.pl</a>.' },
    { pl: 'Rachunki do umowy zlecenia', en: 'Invoices / settlement receipts for mandate contract', ru: 'Счета по договору поручения', condition: 'IF_STUDENT_ON_ZLECENIE', source: 'Wnioskodawca', notes: 'If on umowa zlecenia', info: 'Signed payment receipts (rachunki) from your employer for each settlement period. Bring last 3–6 months.' },
    { pl: 'Zeznanie podatkowe PIT za poprzedni rok', en: 'Annual tax declaration (PIT) for previous year', ru: 'Налоговая декларация PIT за предыдущий год', condition: 'IF_WORKED_PREVIOUS_YEAR', source: 'Wnioskodawca', notes: 'If you worked in Poland last year', info: 'Annual PIT return for previous year filed at <a href="https://www.podatki.gov.pl" target="_blank">podatki.gov.pl</a>. Download submitted and accepted version with UPO confirmation. Deadline: 30 April each year.' },
    { pl: 'Prywatne ubezpieczenie zdrowotne', en: 'Private health insurance', ru: 'Частная медицинская страховка', condition: 'IF_STUDENT_ON_ZLECENIE', source: 'Wnioskodawca', notes: 'Only if student on umowa zlecenia', info: 'Private policy covering stay in Poland, minimum €30,000. Providers: PZU, Allianz, AXA, Generali.' },
    { pl: 'Numer PESEL + kopia', en: 'PESEL number + copy', ru: 'Номер PESEL + копия', condition: 'IF_AVAILABLE', source: 'Wnioskodawca', notes: null, info: 'Include PESEL confirmation and copy if you have one.' },
    { pl: 'Potwierdzenie opłaty skarbowej 440 złotych', en: 'Stamp duty payment confirmation 440 PLN', ru: 'Подтверждение оплаты гербового сбора 440 злотых', condition: 'ALWAYS', source: 'Wnioskodawca', notes: null, info: 'The stamp duty for a work-based TRC is <strong>440 PLN</strong>. Payment must be made to your Voivodeship Office bank account — this is <strong>different in every city in Poland</strong> (Warsaw, Kraków, Wrocław, Gdańsk etc. all have different accounts).<br><br>⚠️ <strong>Do not use any account number found online.</strong> Before making payment, confirm the correct account number with your local Voivodeship Office website or contact us at KartaFlow. Paying to the wrong account can delay your application and refunds are not automatic.<br><br>Alongside this fee, you will also pay a separate <strong>100 PLN card issuance fee</strong> when collecting your decision — this goes to a different account and you will be informed at that stage.' },
    { pl: 'Załącznik nr 1', en: 'Annex No. 1 — employer form', ru: 'Приложение № 1', condition: 'ALWAYS', source: 'Pracodawca (Employer)', notes: null, info: 'Official form from <a href="https://www.gov.pl/web/mswia" target="_blank">gov.pl</a>, completed, signed, and stamped by your employer.' },
    { pl: 'Oświadczenie podmiotu powierzającego wykonywanie pracy', en: "Employer's statement confirming business activity and financial resources", ru: 'Заявление работодателя', condition: 'ALWAYS', source: 'Pracodawca (Employer)', notes: null, info: 'Formal employer declaration on company letterhead confirming active business, ability to pay your salary, and genuine employment. Signed and stamped.' },
    { pl: 'Wydruk KRS/CEIDG', en: 'KRS/CEIDG register extract (employer registration)', ru: 'Выписка KRS/CEIDG', condition: 'IF_AVAILABLE', source: 'Pracodawca (Employer)', notes: null, info: 'Free printout from <a href="https://ekrs.ms.gov.pl" target="_blank">ekrs.ms.gov.pl</a> (companies) or <a href="https://www.ceidg.gov.pl" target="_blank">ceidg.gov.pl</a> (sole traders). Print on submission day.' },
    { pl: 'Zezwolenie na pracę', en: 'Work permit (type A)', ru: 'Разрешение на работу', condition: 'IF_NO_ACCESS_TO_LABOUR_MARKET', source: 'Pracodawca (Employer)', notes: null, info: 'Required only for nationals who need formal work authorisation. Employer applies for this at the Voivodeship Office. Ukrainian citizens and Polish university graduates generally exempt.' },
    { pl: 'Zaświadczenie US o niezaleganiu w podatkach (pracodawca)', en: 'Tax office certificate of no tax arrears — employer', ru: 'Справка из налоговой — работодатель', condition: 'ALWAYS', source: 'Pracodawca (Employer)', notes: null, info: 'Employer tax clearance from their Urząd Skarbowy. Obtained in person or via ePUAP. Valid 3 months from issue.' },
    { pl: 'Zaświadczenie ZUS o braku zaległości (pracodawca)', en: 'ZUS certificate of no contribution arrears — employer', ru: 'Справка из ZUS об отсутствии задолженности — работодатель', condition: 'ALWAYS', source: 'Pracodawca (Employer)', notes: null, info: 'Employer ZUS clearance from <a href="https://www.zus.pl" target="_blank">zus.pl</a> or local ZUS office. Valid 3 months.' },
  ],
  'CT-07': [
    { pl: 'Wniosek o pobyt czasowy', en: 'Temporary residence permit application (Change of Decision)', ru: 'Заявление (изменение решения)', condition: 'ALWAYS', source: 'Wnioskodawca', notes: '2 egzemplarze — Zmiana decyzji procedure', info: 'This is a change-of-decision application (zmiana decyzji), not a standard renewal. Download the application form from <a href="https://cudzoziemcy.gov.pl" target="_blank">cudzoziemcy.gov.pl</a>. Indicate that you are applying for a change of work conditions in your current residence decision. Print 2 copies, fill in Polish block capitals, sign both.' },
    { pl: 'Ważny paszport + kopia wszystkich stron z pieczątkami', en: 'Valid passport + copy of all pages with stamps', ru: 'Паспорт + копии всех страниц с отметками', condition: 'ALWAYS', source: 'Wnioskodawca', notes: null, info: 'Passport valid for full intended stay. Photocopy all stamped/visa/entry pages.' },
    { pl: 'Zdjęcia', en: 'Photos', ru: 'Фото', condition: 'ALWAYS', source: 'Wnioskodawca', notes: '2 photos, 3.5×4.5 cm, 80% face visible', info: '2 photographs, 3.5×4.5 cm. Light background, face 70–80% of frame, taken within last 6 months.' },
    { pl: 'Karta pobytu + ksero', en: 'Residence card + copy', ru: 'Карта побыта + копия', condition: 'ALWAYS', source: 'Wnioskodawca', notes: null, info: 'Your current work TRC. Original for inspection, photocopy of both sides.' },
    { pl: 'Decyzja na pobyt + ksero', en: 'Residence decision + copy', ru: 'Решение по карте + копия', condition: 'ALWAYS', source: 'Wnioskodawca', notes: null, info: 'The decision being changed — original and photocopy of all pages.' },
    { pl: 'Numer PESEL + kopia', en: 'PESEL number + copy', ru: 'Номер PESEL + копия', condition: 'IF_AVAILABLE', source: 'Wnioskodawca', notes: null, info: 'Include PESEL confirmation and copy if you have one.' },
    { pl: 'Potwierdzenie opłaty skarbowej 220 złotych', en: 'Stamp duty payment confirmation 220 PLN', ru: 'Подтверждение оплаты гербового сбора 220 злотых', condition: 'ALWAYS', source: 'Wnioskodawca', notes: '220 PLN for change of decision — NOT 440 PLN', info: 'The stamp duty for a Change of Decision (Zmiana Decyzji) is <strong>220 PLN</strong> — not the standard 440 PLN. Payment must be made to your Voivodeship Office bank account — this is <strong>different in every city in Poland</strong>.<br><br>⚠️ <strong>Do not use any account number found online.</strong> Confirm the correct account with your local Voivodeship Office or contact us at KartaFlow before paying. Paying to the wrong account can delay your application.' },
    { pl: 'Nowa umowa o pracę/zlecenia – kopia', en: 'New employment/mandate contract — copy', ru: 'Новый трудовой договор — копия', condition: 'ALWAYS', source: 'Wnioskodawca', notes: null, info: 'Your new signed employment or mandate contract with the new employer. Must show all details: employer name, your name, position, salary (at least 4,666 PLN gross in 2025), start date, and duration. Bring a copy — original may be requested.' },
    { pl: 'ZUS ZUA wraz z potwierdzeniem wysłania do ZUS', en: 'ZUS ZUA registration with submission confirmation', ru: 'ZUS ZUA с подтверждением', condition: 'IF_NOT_STUDENT', source: 'Wnioskodawca', notes: null, info: 'ZUS ZUA from your new employer. Request last 1–3 months of confirmations, or download from PUE ZUS at <a href="https://www.zus.pl/portal/logowanie.npi" target="_blank">zus.pl</a>.' },
    { pl: 'Prywatne ubezpieczenie zdrowotne', en: 'Private health insurance', ru: 'Частная медицинская страховка', condition: 'IF_STUDENT_ON_ZLECENIE', source: 'Wnioskodawca', notes: null, info: 'Required if on umowa zlecenia. Private policy covering stay, minimum €30,000.' },
    { pl: 'Załącznik nr 1', en: 'Annex No. 1 — new employer form', ru: 'Приложение № 1 — новый работодатель', condition: 'ALWAYS', source: 'Pracodawca (Employer)', notes: null, info: 'Completed by your NEW employer. Download from MOS portal or Voivodeship Office website. Fill, sign, stamp. Under MOS v2, signed digitally.' },
    { pl: 'Oświadczenie podmiotu powierzającego wykonywanie pracy', en: "New employer's statement confirming business activity and financial resources", ru: 'Заявление нового работодателя', condition: 'ALWAYS', source: 'Pracodawca (Employer)', notes: null, info: 'Formal declaration from your new employer on company letterhead confirming active business and ability to employ you. Signed and stamped.' },
    { pl: 'Wydruk KRS/CEIDG', en: 'KRS/CEIDG register extract (new employer)', ru: 'Выписка KRS/CEIDG нового работодателя', condition: 'IF_AVAILABLE', source: 'Pracodawca (Employer)', notes: null, info: 'Free printout from <a href="https://ekrs.ms.gov.pl" target="_blank">ekrs.ms.gov.pl</a> (companies) or <a href="https://www.ceidg.gov.pl" target="_blank">ceidg.gov.pl</a> (sole traders). Print on submission day.' },
    { pl: 'ZUS ZUA wraz z potwierdzeniem (pracodawca)', en: 'ZUS ZUA registration — new employer copy', ru: 'ZUS ZUA нового работодателя', condition: 'IF_NOT_STUDENT', source: 'Pracodawca (Employer)', notes: null, info: 'New employer\'s ZUS ZUA confirming your registration for social insurance at the new workplace.' },
    { pl: 'Zezwolenie na pracę', en: 'Work permit (type A)', ru: 'Разрешение на работу', condition: 'IF_NO_ACCESS_TO_LABOUR_MARKET', source: 'Pracodawca (Employer)', notes: null, info: 'Required only for nationals without automatic labour market access. New employer must apply at the Voivodeship Office.' },
    { pl: 'Zaświadczenie US o niezaleganiu w podatkach', en: 'Tax office certificate of no tax arrears — new employer', ru: 'Справка из налоговой — новый работодатель', condition: 'ALWAYS', source: 'Pracodawca (Employer)', notes: null, info: 'Tax clearance from the new employer\'s Urząd Skarbowy. Valid 3 months from issue.' },
    { pl: 'Zaświadczenie ZUS o braku zaległości', en: 'ZUS certificate of no contribution arrears — new employer', ru: 'Справка из ZUS — новый работодатель', condition: 'ALWAYS', source: 'Pracodawca (Employer)', notes: null, info: 'New employer\'s ZUS clearance certificate. Request at <a href="https://www.zus.pl" target="_blank">zus.pl</a> or local ZUS office. Valid 3 months.' },
  ],
  'CT-08': [
    { pl: 'Wniosek o pobyt czasowy', en: 'Temporary residence permit application', ru: 'Заявление', condition: 'ALWAYS', source: 'Wnioskodawca', notes: '2 egzemplarze (2 copies required)', info: 'Fill in and submit via the MOS portal: <a href="https://mos.cudzoziemcy.gov.pl/en/wniosek" target="_blank">mos.cudzoziemcy.gov.pl/en/wniosek</a> (English, Ukrainian, Russian available). Select family reunification basis (łączenie rodzin). Print 2 copies, fill in Polish block capitals, sign both.' },
    { pl: 'Ważny paszport + kopia wszystkich stron z pieczątkami', en: 'Valid passport + copy of all pages with stamps', ru: 'Паспорт + копии всех страниц с отметками', condition: 'ALWAYS', source: 'Wnioskodawca', notes: null, info: 'Passport valid for full intended stay. Photocopy all stamped/visa/entry pages plus photo page.' },
    { pl: 'Zdjęcia', en: 'Photos', ru: 'Фото', condition: 'ALWAYS', source: 'Wnioskodawca', notes: '2 photos, 3.5×4.5 cm, 80% face visible', info: '2 photographs, 3.5×4.5 cm. Light background, face 70–80% of frame. Taken within last 6 months.' },
    { pl: 'Akt małżeństwa + kopia', en: 'Marriage certificate + copy', ru: 'Свидетельство о браке + копия', condition: 'IF_SPOUSE', source: 'Wnioskodawca', notes: 'Only for spouse applicants', info: 'Your original marriage certificate. Bring the original and a photocopy. If issued in a non-Polish language, a sworn translation (tłumaczenie przysięgłe) by a certified Polish translator is required. Find certified translators at <a href="https://www.ms.gov.pl" target="_blank">ms.gov.pl</a>.' },
    { pl: 'Akt urodzenia + kopia', en: 'Birth certificate + copy', ru: 'Свидетельство о рождении + копия', condition: 'IF_CHILD_OR_PARENT', source: 'Wnioskodawca', notes: 'For children or parents — confirms family relationship', info: 'Your original birth certificate confirming the family relationship with your sponsor in Poland. Bring original and photocopy. If in non-Polish language, a sworn translation is required. Find certified translators at <a href="https://www.ms.gov.pl" target="_blank">ms.gov.pl</a>.' },
    { pl: 'Tłumaczenie przysięgłe aktu stanu cywilnego', en: 'Certified sworn translation of civil status document', ru: 'Присяжный перевод документа гражданского состояния', condition: 'ALWAYS', source: 'Wnioskodawca', notes: 'If marriage/birth certificate is not in Polish', info: 'Required when your marriage or birth certificate is in a foreign language. Must be done by a sworn (przysięgły) translator certified in Poland. Cost: approx. 100–200 PLN. Find certified translators at the Ministry of Justice registry: <a href="https://www.ms.gov.pl/pl/tlumacze-przysiegli/lista-tlumaczy-przysieglych/" target="_blank">ms.gov.pl/tlumacze-przysiegli</a>.' },

// ─── CASE ASSIGNMENT ────────────────────────────────────────────────────────
function assignCase() {
  const cs = answers.currentStatus;
  const tb = answers.targetBasis;

  // Business → consultation redirect (handled in renderResults)
  if (tb === 'business') return 'BUSINESS';

  // Graduate direct selection from Q3
  if (tb === 'graduate') return 'CT-03';

  // Graduate via work flow decision point
  if (answers.graduateChoice === 'CT-03') return 'CT-03';
  if (answers.graduateChoice === 'CT-04') return 'CT-04';

  if (tb === 'study') {
    if (cs === 'trc_study') return 'CT-02';
    return 'CT-01';
  }

  if (tb === 'work') {
    // trc_work holder chose procedure explicitly
    if (cs === 'trc_work') {
      if (answers.workProcedureType === 'change_decision') return 'CT-07';
      return 'CT-06';
    }
    if (cs === 'trc_study') return 'CT-04';
    return 'CT-05';
  }

  if (tb === 'family') {
    // Parent or partner → other circumstances
    if (answers.familyMember === 'parent' || answers.familyMember === 'partner') return 'CT-09';
    // Spouse/child with insufficient sponsor status → other circumstances
    if (answers.sponsorStatus === 'less_than_2' || answers.sponsorStatus === 'not_sure') return 'CT-09';
    // Qualified family reunification
    return 'CT-08';
  }

  if (tb === 'other_circumstances') return 'CT-09';

  return 'CT-09';
}

    'CT-05': { en: 'Work Visa → Work TRC', pl: 'Wiza pracownicza → Karta Pobytu (praca)', ru: 'Рабочая виза → КВП (работа)' },

// ─── RENDER ─────────────────────────────────────────────────────────────────
function activeQuestions() {
  return getQuestions().filter(q => q.showWhen());
}

function setProgress(pct, stepNum, total) {
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent = Math.round(pct) + '%';
  if (stepNum && total) {
    document.getElementById('progressStepText').textContent = tx('stepLabel') + ' ' + stepNum + ' ' + tx('of') + ' ' + total;
  }
}

function render() {
  const c = document.getElementById('appContainer');
  c.innerHTML = '';
  const questions = activeQuestions();

  if (currentStep < questions.length) {
    const q = questions[currentStep];
    const total = questions.length;
    const pct = (currentStep / total) * 85;
    setProgress(pct, currentStep + 1, total);

    const card = document.createElement('div');
    card.className = 'card';

    // Step label
    const stepLbl = document.createElement('div');
    stepLbl.className = 'step-label';
    stepLbl.textContent = tx('stepLabel') + ' ' + (currentStep + 1) + ' ' + tx('of') + ' ' + total;
    card.appendChild(stepLbl);

    // Decision banner
    if (q.type === 'graduate_decision') {
      const banner = document.createElement('div');
      banner.className = 'decision-banner';
      banner.textContent = '⚡ ' + tx('decisionPoint');
      card.appendChild(banner);
    }

    // Question title
    const title = document.createElement('div');
    title.className = 'question-title';
    title.textContent = tObj(q.question);
    card.appendChild(title);

    // Purpose
    const purpose = document.createElement('div');
    purpose.className = 'question-purpose';
    purpose.textContent = '💡 ' + tx('purposeLabel') + ': ' + tObj(q.purpose);
    card.appendChild(purpose);

    // Options container
    const grid = document.createElement('div');
    grid.className = 'options-grid';
    card.appendChild(grid);

    // Render by type
    if (q.type === 'choice') {
      renderChoiceOptions(q, grid);
    } else if (q.type === 'select') {
      renderCountrySearch(q, grid);
    } else if (q.type === 'graduate_decision') {
      renderGraduateDecision(q, grid);
    }

    // Nav
    const nav = document.createElement('div');
    nav.className = 'nav-row';

    const backBtn = document.createElement('button');
    backBtn.className = 'btn btn-ghost';
    backBtn.textContent = tx('backBtn');
    backBtn.onclick = goBack;
    if (currentStep === 0) { backBtn.style.display = 'none'; }
    nav.appendChild(backBtn);

    const nextBtn = document.createElement('button');
    nextBtn.className = 'btn btn-primary';
    nextBtn.id = 'continueBtn';
    nextBtn.textContent = tx('nextBtn') + ' →';
    nextBtn.disabled = !answers[q.id];
    nextBtn.onclick = goNext;
    nav.appendChild(nextBtn);
    card.appendChild(nav);

    c.appendChild(card);

  } else {
    // Results
    setProgress(100);
    const caseId = assignCase();
    renderResults(c, caseId);
  }
}

function renderChoiceOptions(q, grid) {
  q.options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'option-btn' + (answers[q.id] === opt.value ? ' selected' : '');

    const dot = document.createElement('span');
    dot.className = 'option-indicator';
    btn.appendChild(dot);

    const lbl = document.createElement('span');
    lbl.textContent = tObj(opt.label);
    btn.appendChild(lbl);

    btn.onclick = () => {
      answers[q.id] = opt.value;
      if (q.id === 'currentStatus' || q.id === 'targetBasis') {
        ['studyStatus','studyContinue','studyType','hasEmployer','hasGraduated','graduateChoice',
         'workProcedureType','changedEmployer','employerInDecyzja',
         'familyMember','sponsorStatus','otherCircumstancesType'
        ].forEach(k => delete answers[k]);
      }
      if (q.id === 'familyMember') {
        ['sponsorStatus','otherCircumstancesType'].forEach(k => delete answers[k]);
      }
      if (q.id === 'workProcedureType') {
        ['changedEmployer','employerInDecyzja','hasEmployer'].forEach(k => delete answers[k]);
      }
      render();
    };
    grid.appendChild(btn);
  });
}

function renderCountrySearch(q, grid) {
  const wrap = document.createElement('div');
  wrap.className = 'country-search-wrap';

  const input = document.createElement('input');
  input.type = 'text';
  input.className = 'country-input';
  input.placeholder = tx('searchPlaceholder');
  input.autocomplete = 'off';

  if (answers[q.id]) {
    const found = q.options.find(o => o.value === answers[q.id]);
    if (found) input.value = tObj(found.label);
  }

  const dd = document.createElement('div');
  dd.className = 'country-dropdown';

  function populate(filter) {
    dd.innerHTML = '';
    const filtered = q.options.filter(o => tObj(o.label).toLowerCase().includes(filter.toLowerCase()));
    if (!filtered.length) {
      const msg = document.createElement('div');
      msg.className = 'country-no-results';
      msg.textContent = tx('noResults');
      dd.appendChild(msg);
    } else {
      filtered.forEach(opt => {
        const item = document.createElement('div');
        item.className = 'country-option' + (answers[q.id] === opt.value ? ' active' : '');
        item.textContent = tObj(opt.label);
        item.onmousedown = (e) => {
          e.preventDefault();
          answers[q.id] = opt.value;
          input.value = tObj(opt.label);
          dd.style.display = 'none';
          const cb = document.getElementById('continueBtn');
          if (cb) cb.disabled = false;
        };
        dd.appendChild(item);
      });
    }
    dd.style.display = 'block';
  }

  input.oninput = () => populate(input.value);
  input.onfocus = () => populate(input.value);
  input.onblur = () => setTimeout(() => { dd.style.display = 'none'; }, 200);

  wrap.appendChild(input);
  wrap.appendChild(dd);
  grid.appendChild(wrap);
}

function renderGraduateDecision(q, grid) {
  q.options.forEach(opt => {
    const card = document.createElement('div');
    card.className = 'grad-card' + (answers[q.id] === opt.value ? ' selected' : '');

    const header = document.createElement('div');
    header.className = 'grad-card-header';

    const dot = document.createElement('div');
    dot.className = 'grad-card-dot';
    header.appendChild(dot);

    const titleEl = document.createElement('div');
    titleEl.className = 'grad-card-title';
    titleEl.textContent = tObj(opt.label);
    header.appendChild(titleEl);
    card.appendChild(header);

    const desc = document.createElement('div');
    desc.className = 'grad-card-desc';
    desc.textContent = tObj(opt.description);
    card.appendChild(desc);

    card.onclick = () => {
      answers[q.id] = opt.value;
      const cb = document.getElementById('continueBtn');
      if (cb) cb.disabled = false;
      render();
    };
    grid.appendChild(card);
  });
}
